# ============================================================
#  Nintendo Gamepad Controller — 配置文件
# ============================================================

[network]
# controller.py 连接的目标地址（STM32 或本地模拟器）
# 本地联调时填 127.0.0.1，对接真实板子时改为板子 IP
host = 127.0.0.1

# 目标端口，需与 [simulator] port 一致（本地调试时）
# 对接真实 STM32 时改为板子监听的端口
port = 7777

# 传输协议: json 或 binary
#   json   → {"buttons":{...},"axes":{...},"hat":[x,y]}\n
#   binary → 14 字节定长包 (见 controller.py _encode_binary 注释)
protocol = json

# 仅在状态变化时发送 (推荐 true，避免刷屏)
# 设为 false 则按 send_interval 周期发送
only_on_change = true

# 周期发送间隔（秒），only_on_change=false 时生效
# 0.05 = 20 Hz
send_interval = 0.05

# 连接失败后的重试间隔（秒）
reconnect_delay = 3.0


[gamepad]
# 模拟摇杆死区 (0.0 ~ 1.0)
# 绝对值小于此阈值的轴输入视为 0
deadzone = 0.05

# 控制器名称过滤（不区分大小写，留空则自动选第一个设备）
# Nintendo Switch Pro Controller 示例：
; name_contains = pro controller
# Joy-Con 示例：
; name_contains = joy-con
name_contains =

# 轮询频率（Hz），建议 100（10ms/帧）
poll_hz = 100.0


[logging]
# 日志目录（相对于脚本位置，或绝对路径）
log_dir = logs


# ============================================================
#  模拟器配置（simulator.py 使用）
#  host / port：simulator.py 监听的本地地址
#  与 [network] 的 host/port 保持一致即可完成本地联调
# ============================================================
[simulator]
host = 127.0.0.1
port = 7777


# ============================================================
#  按钮编号映射（可选覆盖）
#  格式：<按钮序号> = <名称>
#
#  Nintendo Switch Pro Controller 默认映射（SDL2 原始 HID）：
#    0=B  1=A  2=Y  3=X  4=L  5=R  6=ZL  7=ZR
#    8=MINUS  9=PLUS  10=L_STICK  11=R_STICK
#    12=HOME  13=CAPTURE
#
#  注意：不同系统/驱动可能导致编号不同。
#  运行程序时控制台会打印手柄名称，可用于判断映射是否正确。
#  启用下方配置可覆盖默认值（去掉行首分号）：
# ============================================================
[button_map]
; 0 = B
; 1 = A
; 2 = Y
; 3 = X
; 4 = L
; 5 = R
; 6 = ZL
; 7 = ZR
; 8 = MINUS
; 9 = PLUS
; 10 = L_STICK
; 11 = R_STICK
; 12 = HOME
; 13 = CAPTURE


# ============================================================
#  摇杆轴编号映射（可选覆盖）
#  格式：<轴序号> = <名称>
#
#  默认：0=LX  1=LY  2=RX  3=RY
# ============================================================
[axis_map]
; 0 = LX
; 1 = LY
; 2 = RX
; 3 = RY
